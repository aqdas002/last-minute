name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build + test (Maven verify)
        working-directory: backend
        run: ./mvnw -B verify

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      # NOTE: not --frozen-lockfile — vite 8 pulls rolldown which has a
      # linux-x64 native binding that isn't in the lockfile because we
      # generate the lockfile on WSL/macOS. Drop frozen so CI can install
      # the missing platform binary; revisit when we have a Linux dev env.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm tsc -b --noEmit
      - run: pnpm lint
      - run: pnpm build
