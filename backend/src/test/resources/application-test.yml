spring:
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    hikari:
      # Small pool per Spring context. With several context-varying @TestConfiguration
      # in the suite, multiple HikariCP instances live concurrently; this keeps each
      # one small so we don't hit Postgres' max_connections cap.
      maximum-pool-size: 5
      minimum-idle: 0
      idle-timeout: 30000
      connection-timeout: 30000

sentry:
  enabled: false

app:
  resend:
    api-key: ""
  stripe:
    secret-key: "sk_test_fake_for_tests"
    webhook-secret: "whsec_test_secret_for_tests"
  base-url: "http://localhost:8080"
  frontend-origin: "http://localhost:5173"
  commission-percent: 15
