spring:
  application:
    name: last-minute
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/lastminute}
    username: ${DATABASE_USER:lastminute}
    password: ${DATABASE_PASSWORD:lastminute}
  jpa:
    hibernate:
      ddl-auto: validate                 # Flyway owns schema
    open-in-view: false                  # avoid OSIV foot-gun
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
  # Google OAuth2 client wires up in Task 9 (auth). When AUTH_GOOGLE_ID is unset,
  # Spring's validator rejects an empty registration, so we omit it entirely here
  # and let Task 9 introduce it inside a profile or a @Conditional config.

server:
  port: 8080
  forward-headers-strategy: framework   # behind Fly.io proxy

app:
  base-url: ${APP_URL:http://localhost:8080}
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  resend:
    api-key: ${RESEND_API_KEY:}
    from: ${EMAIL_FROM:dev@local}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  commission-percent: 15

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:development}
  traces-sample-rate: 0.1
  enabled: false                          # explicit; flip to true when DSN is set in prod
